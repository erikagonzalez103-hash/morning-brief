<title>Eridion — Process Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#1B2A4A;--navy-deep:#111D33;--green:#2D6A4F;--green-light:#40916C;
  --cream:#F8F5EF;--cream-dark:#EDE8DD;--gold:#C9A84C;--gold-light:#E8C96A;
  --red:#C0392B;--red-soft:#FDF0EE;--amber:#D68910;--amber-soft:#FEF9EC;
  --teal:#1A7A7A;--teal-soft:#EAF5F5;--purple:#6B4C9A;--purple-soft:#F2EDFA;
  --text:#1B2A4A;--text-2:#4A5568;--text-3:#8A95A3;--border:#DDD6CA;--white:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--cream);color:var(--text);min-height:100vh;font-size:14px;}

.topbar{background:var(--navy-deep);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100;}
.logo{font-family:'DM Serif Display',serif;color:var(--cream);font-size:20px;letter-spacing:.03em;display:flex;align-items:center;gap:8px;}
.logo-dot{color:var(--gold);}
.logo-tag{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;border-left:1px solid rgba(255,255,255,.15);padding-left:10px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.add-btn{background:var(--gold);color:var(--navy-deep);border:none;padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.add-btn:hover{background:var(--gold-light);}

.main{max-width:1100px;margin:0 auto;padding:1.5rem;}

.lib-header{margin-bottom:1.5rem;}
.lib-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--navy);}
.lib-title em{color:var(--green);font-style:italic;}
.lib-sub{font-size:13px;color:var(--text-3);margin-top:4px;}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;}
.filter-btn{font-size:11px;font-weight:600;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--text-2);cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.04em;}
.filter-btn:hover{border-color:var(--navy);color:var(--navy);}
.filter-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.search-box{flex:1;max-width:300px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--white);color:var(--text);outline:none;}
.search-box:focus{border-color:var(--navy);}

/* PROCESS GRID */
.process-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;}

/* PROCESS CARD */
.proc-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .15s;cursor:pointer;animation:fadeUp .3s ease both;}
.proc-card:hover{border-color:var(--navy);box-shadow:0 2px 12px rgba(27,42,74,.08);}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.proc-card-header{padding:14px 16px;border-bottom:1px solid var(--cream-dark);display:flex;align-items:flex-start;gap:10px;}
.proc-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.proc-cat-info{flex:1;min-width:0;}
.proc-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;}
.proc-category{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;font-weight:500;}
.proc-status{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0;}
.status-active{background:#EAF5EE;color:var(--green);}
.status-draft{background:var(--amber-soft);color:var(--amber);}
.status-review{background:var(--purple-soft);color:var(--purple);}

.proc-body{padding:12px 16px;}
.proc-trigger{font-size:12px;color:var(--text-2);margin-bottom:8px;line-height:1.5;}
.proc-trigger strong{color:var(--text);font-weight:600;}
.proc-steps{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.proc-step{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text-2);line-height:1.5;}
.step-num{width:18px;height:18px;border-radius:50%;background:var(--cream-dark);color:var(--text-3);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.proc-exceptions{font-size:11px;color:var(--amber);background:var(--amber-soft);border-radius:6px;padding:6px 10px;margin-bottom:8px;line-height:1.5;}
.proc-exceptions strong{font-weight:600;}
.proc-deadline{font-size:11px;color:var(--red);font-weight:600;display:flex;align-items:center;gap:5px;}
.proc-footer{padding:10px 16px;border-top:1px solid var(--cream-dark);display:flex;align-items:center;justify-content:space-between;}
.proc-meta{font-size:11px;color:var(--text-3);}
.proc-actions{display:flex;gap:5px;}
.proc-act-btn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:var(--white);color:var(--text-2);cursor:pointer;transition:all .15s;}
.proc-act-btn:hover{background:var(--navy);color:var(--white);border-color:var(--navy);}
.proc-act-btn.edit{color:var(--navy);border-color:var(--navy);}

/* CATEGORY COLORS */
.cat-billing{background:var(--green);}
.cat-operations{background:var(--teal);}
.cat-vendors{background:var(--gold);}
.cat-builders{background:var(--navy);}
.cat-subs{background:var(--purple);}
.cat-filing{background:var(--amber);}
.cat-invoicing{background:var(--red);}

/* ADD PROCESS MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(17,29,51,.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:14px;width:min(600px,95vw);max-height:90vh;overflow-y:auto;}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--navy);}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-3);padding:4px;}
.modal-body{padding:20px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
.field input,.field select,.field textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;background:var(--white);}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);}
.field textarea{resize:vertical;min-height:80px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.steps-builder{border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.step-row-input{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--cream-dark);}
.step-row-input:last-child{border-bottom:none;}
.step-num-static{width:20px;height:20px;border-radius:50%;background:var(--navy);color:var(--white);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-input{flex:1;border:none;font-size:13px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;}
.add-step-btn{padding:8px 10px;font-size:12px;color:var(--text-3);cursor:pointer;border:none;background:none;text-align:left;width:100%;border-top:1px solid var(--cream-dark);}
.add-step-btn:hover{color:var(--navy);background:var(--cream);}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.btn-save{background:var(--navy);color:var(--white);border:none;padding:8px 20px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-save:hover{background:var(--green);}
.btn-cancel{background:var(--white);color:var(--text-2);border:1px solid var(--border);padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;}

/* EMPTY STATE */
.empty-lib{text-align:center;padding:60px 20px;color:var(--text-3);}
.empty-lib-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text-2);margin-bottom:8px;}

@media(max-width:600px){.process-grid{grid-template-columns:1fr;}.field-row{grid-template-columns:1fr;}}

/* COMMAND CENTER NAV */
.cc-nav{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.1);padding:0 1.5rem;display:flex;align-items:center;height:40px;gap:2px;overflow-x:auto;}
.cc-nav-link{font-size:12px;font-weight:500;padding:5px 16px;border-radius:6px;color:rgba(255,255,255,.45);text-decoration:none;transition:all .2s;white-space:nowrap;}
.cc-nav-link:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.07);}
.cc-nav-link.active{color:var(--white);background:rgba(255,255,255,.13);}
</style>
</head>

<div class="topbar">
  <div class="logo">Eridion<span class="logo-dot">.</span><span class="logo-tag">Process Library</span></div>
  <div class="topbar-right">
    <button class="add-btn" onclick="openModal()">+ Add process</button>
  </div>
</div>


<nav class="cc-nav">

</nav>
<div class="main">

  <div class="lib-header">
    <div class="lib-title">Living <em>Process Library</em></div>
    <div class="lib-sub">Eridion's institutional knowledge — how we work, documented and always current. Francisco learns from this. So does everyone else.</div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterCat('all',this)">All</button>
    <button class="filter-btn" onclick="filterCat('invoicing',this)">Invoicing</button>
    <button class="filter-btn" onclick="filterCat('billing',this)">Billing</button>
    <button class="filter-btn" onclick="filterCat('builders',this)">Builders</button>
    <button class="filter-btn" onclick="filterCat('vendors',this)">Vendors</button>
    <button class="filter-btn" onclick="filterCat('subs',this)">Sub installers</button>
    <button class="filter-btn" onclick="filterCat('operations',this)">Operations</button>
    <button class="filter-btn" onclick="filterCat('filing',this)">Filing</button>
    <input class="search-box" type="text" placeholder="Search processes..." oninput="searchProcs(this.value)">
  </div>

  <div class="process-grid" id="process-grid"></div>

</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Add process</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field">
          <label>Process name</label>
          <input type="text" id="f-name" placeholder="e.g. Grand Homes invoice trigger">
        </div>
        <div class="field">
          <label>Category</label>
          <select id="f-category">
            <option value="invoicing">Invoicing</option>
            <option value="billing">Billing</option>
            <option value="builders">Builders</option>
            <option value="vendors">Vendors</option>
            <option value="subs">Sub installers</option>
            <option value="operations">Operations</option>
            <option value="filing">Filing</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Trigger — what starts this process?</label>
        <input type="text" id="f-trigger" placeholder="e.g. BuildPro completion notification arrives">
      </div>
      <div class="field">
        <label>Steps</label>
        <div class="steps-builder" id="steps-builder">
          <div class="step-row-input"><div class="step-num-static">1</div><input class="step-input" type="text" placeholder="First step..."></div>
          <div class="step-row-input"><div class="step-num-static">2</div><input class="step-input" type="text" placeholder="Second step..."></div>
        </div>
        <button class="add-step-btn" onclick="addStep()">+ Add step</button>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Exceptions / edge cases</label>
          <textarea id="f-exceptions" placeholder="e.g. If job is known complete before BuildPro email, don't wait..."></textarea>
        </div>
        <div class="field">
          <label>Deadline (if any)</label>
          <input type="text" id="f-deadline" placeholder="e.g. Invoices due Friday before noon">
        </div>
      </div>
      <div class="field">
        <label>Who's responsible</label>
        <input type="text" id="f-owner" placeholder="e.g. Erika — billing, Dion — operations">
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Additional context, history, or future changes planned..."></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveProcess()">Save process</button>
    </div>
  </div>
</div>

let processes = [];
let activeFilter = 'all';
let searchTerm = '';
let editingId = null;
let stepCount = 2;

// ── INIT ─────────────────────────────────────────────────────────────
const LIBRARY_VERSION = '1.3';

function init() {
  // Clear any stale cached data and always start fresh from seeds
  // User additions are saved on top of seeds via saveToStorage()
  localStorage.removeItem('eridion_processes');
  localStorage.setItem('eridion_processes_version', LIBRARY_VERSION);
  processes = [...SEED_PROCESSES];
  saveToStorage();
  renderGrid();
}

function saveToStorage() {
  localStorage.setItem('eridion_processes', JSON.stringify(processes));
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('process-grid');
  let filtered = processes;

  if (activeFilter !== 'all') {
    filtered = filtered.filter(p => p.category === activeFilter);
  }
  if (searchTerm) {
    const q = searchTerm.toLowerCase();
    filtered = filtered.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.trigger.toLowerCase().includes(q) ||
      (p.steps||[]).some(s => s.toLowerCase().includes(q)) ||
      (p.notes||'').toLowerCase().includes(q)
    );
  }

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-lib" style="grid-column:1/-1"><div class="empty-lib-title">No processes found</div><div>Add your first process or adjust the filter.</div></div>';
    return;
  }

  const catColors = {
    invoicing:'cat-invoicing',billing:'cat-billing',builders:'cat-builders',
    vendors:'cat-vendors',subs:'cat-subs',operations:'cat-operations',filing:'cat-filing'
  };
  const catLabels = {
    invoicing:'Invoicing',billing:'Billing',builders:'Builders',
    vendors:'Vendors',subs:'Sub installers',operations:'Operations',filing:'Filing'
  };
  const statusLabels = { active:'Active', draft:'Draft', review:'Needs review' };
  const statusClass = { active:'status-active', draft:'status-draft', review:'status-review' };

  grid.innerHTML = filtered.map(p => `
    <div class="proc-card" id="card-${p.id}">
      <div class="proc-card-header">
        <div class="proc-cat-dot ${catColors[p.category]||'cat-operations'}"></div>
        <div class="proc-cat-info">
          <div class="proc-title">${esc(p.name)}</div>
          <div class="proc-category">${catLabels[p.category]||p.category}</div>
        </div>
        <span class="proc-status ${statusClass[p.status]||'status-draft'}">${statusLabels[p.status]||p.status}</span>
      </div>
      <div class="proc-body">
        <div class="proc-trigger"><strong>Trigger:</strong> ${esc(p.trigger)}</div>
        <div class="proc-steps">
          ${(p.steps||[]).slice(0,4).map((s,i) => `<div class="proc-step"><div class="step-num">${i+1}</div>${esc(s)}</div>`).join('')}
          ${p.steps?.length > 4 ? `<div style="font-size:11px;color:var(--text-3);padding-left:26px">+${p.steps.length-4} more steps</div>` : ''}
        </div>
        ${p.exceptions ? `<div class="proc-exceptions"><strong>Exception:</strong> ${esc(p.exceptions)}</div>` : ''}
        ${p.deadline ? `<div class="proc-deadline">⏰ ${esc(p.deadline)}</div>` : ''}
      </div>
      <div class="proc-footer">
        <div class="proc-meta">Updated ${esc(p.updated)} · ${esc(p.owner||'—')}</div>
        <div class="proc-actions">
          <button class="proc-act-btn edit" onclick="editProcess('${p.id}',event)">Edit</button>
          <button class="proc-act-btn" onclick="deleteProcess('${p.id}',event)">Delete</button>
        </div>
      </div>
    </div>`).join('');
}

// ── FILTER / SEARCH ───────────────────────────────────────────────────
function filterCat(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function searchProcs(val) {
  searchTerm = val;
  renderGrid();
}

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(proc = null) {
  editingId = proc ? proc.id : null;
  document.getElementById('modal-title').textContent = proc ? 'Edit process' : 'Add process';
  document.getElementById('f-name').value = proc?.name || '';
  document.getElementById('f-category').value = proc?.category || 'operations';
  document.getElementById('f-trigger').value = proc?.trigger || '';
  document.getElementById('f-exceptions').value = proc?.exceptions || '';
  document.getElementById('f-deadline').value = proc?.deadline || '';
  document.getElementById('f-owner').value = proc?.owner || 'Erika';
  document.getElementById('f-notes').value = proc?.notes || '';

  // Build steps
  const builder = document.getElementById('steps-builder');
  const steps = proc?.steps || ['', ''];
  stepCount = steps.length;
  builder.innerHTML = steps.map((s, i) =>
    `<div class="step-row-input"><div class="step-num-static">${i+1}</div><input class="step-input" type="text" value="${esc(s)}" placeholder="Step ${i+1}..."></div>`
  ).join('');

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function addStep() {
  stepCount++;
  const builder = document.getElementById('steps-builder');
  const row = document.createElement('div');
  row.className = 'step-row-input';
  row.innerHTML = `<div class="step-num-static">${stepCount}</div><input class="step-input" type="text" placeholder="Step ${stepCount}...">`;
  builder.appendChild(row);
}

function saveProcess() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Please enter a process name.'); return; }

  const steps = Array.from(document.querySelectorAll('.step-input'))
    .map(i => i.value.trim())
    .filter(Boolean);

  const proc = {
    id: editingId || 'p' + Date.now(),
    name,
    category: document.getElementById('f-category').value,
    status: 'active',
    trigger: document.getElementById('f-trigger').value.trim(),
    steps,
    exceptions: document.getElementById('f-exceptions').value.trim(),
    deadline: document.getElementById('f-deadline').value.trim() || null,
    owner: document.getElementById('f-owner').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    updated: new Date().toISOString().split('T')[0],
  };

  if (editingId) {
    const idx = processes.findIndex(p => p.id === editingId);
    if (idx >= 0) processes[idx] = proc;
  } else {
    processes.unshift(proc);
  }

  saveToStorage();
  renderGrid();
  closeModal();
}

function editProcess(id, event) {
  event.stopPropagation();
  const proc = processes.find(p => p.id === id);
  if (proc) openModal(proc);
}

function deleteProcess(id, event) {
  event.stopPropagation();
  if (!confirm('Delete this process?')) return;
  processes = processes.filter(p => p.id !== id);
  saveToStorage();
  renderGrid();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
